x-spark-common: &spark-common
  image: spark:3.5.8-python3
  environment: &spark-env
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"
    MYSQL_DATABASE: classicmodels
    MYSQL_USER: etl
    MYSQL_PASSWORD: etl
    POSTGRES_DW_HOST: postgres-dw
    POSTGRES_DW_PORT: "5432"
    POSTGRES_DW_DB: star_schema_dw
    POSTGRES_DW_USER: warehouse_user
    POSTGRES_DW_PASSWORD: warehouse_password
    SPARK_PACKAGES: com.mysql:mysql-connector-j:8.4.0,org.postgresql:postgresql:42.7.3
    SPARK_SUBMIT_CONF: "--conf spark.jars.ivy=/tmp/.ivy2"
  volumes:
    - ./etl/jobs:/opt/spark/jobs:ro
  restart: "no"

x-airflow-common: &airflow-common
  build: .
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: classicmodels-lakehouse-demo
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    DOCKER_HOST: unix:///var/run/docker.sock
    AIRFLOW_HOST_PROJECT_ROOT: "${PWD:-/home/huy/Desktop/bigdata_code/star_schema}"
  user: "0:0"
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./etl/jobs:/opt/spark/jobs:ro
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  mysql:
    image: mysql:8.4
    container_name: classicmodels-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: classicmodels
      MYSQL_USER: etl
      MYSQL_PASSWORD: etl
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # PostgreSQL as Data Warehouse
  postgres-dw:
    image: postgres:16
    container_name: classicmodels-dw
    environment:
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_password
      POSTGRES_DB: star_schema_dw
    ports:
      - "5433:5432"
    volumes:
      - dw_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d star_schema_dw"]
      interval: 5s
      timeout: 5s
      retries: 20

  etl:
    <<: *spark-common
    container_name: classicmodels-etl
    depends_on:
      mysql:
        condition: service_healthy
      postgres-dw:
        condition: service_healthy
    command: >
      bash -lc "
      /opt/spark/bin/spark-submit
      --packages $${SPARK_PACKAGES}
      $${SPARK_SUBMIT_CONF}
      /opt/spark/jobs/build_star_schema.py
      "

  sync:
    <<: *spark-common
    container_name: classicmodels-sync
    profiles:
      - scheduler
    depends_on:
      mysql:
        condition: service_healthy
      postgres-dw:
        condition: service_healthy
    environment:
      <<: *spark-env
      SYNC_INTERVAL_SECONDS: "${SYNC_INTERVAL_SECONDS:-300}"
    command: >
      bash -lc "
      while true; do
        date;
        /opt/spark/bin/spark-submit
        --packages $${SPARK_PACKAGES}
        $${SPARK_SUBMIT_CONF}
        /opt/spark/jobs/build_star_schema.py
        || echo 'ETL sync failed';
        sleep $${SYNC_INTERVAL_SECONDS};
      done
      "

  query:
    <<: *spark-common
    container_name: classicmodels-query
    profiles:
      - tools
    depends_on:
      postgres-dw:
        condition: service_healthy
    command: >
      bash -lc "
      /opt/spark/bin/spark-submit
      --packages $${SPARK_PACKAGES}
      $${SPARK_SUBMIT_CONF}
      /opt/spark/jobs/query_star_schema.py
      "

  airflow-postgres:
    image: postgres:16
    container_name: classicmodels-airflow-postgres
    profiles:
      - airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  airflow-init:
    <<: *airflow-common
    container_name: classicmodels-airflow-init
    profiles:
      - airflow
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate && (airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true)"

  airflow-webserver:
    <<: *airflow-common
    container_name: classicmodels-airflow-webserver
    profiles:
      - airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      postgres-dw:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    <<: *airflow-common
    container_name: classicmodels-airflow-scheduler
    profiles:
      - airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      postgres-dw:
        condition: service_healthy
    command: scheduler

volumes:
  mysql_data:
  dw_data:
  airflow_postgres_data:
